<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIPEC - Seguimiento de Pedidos</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body style="margin: 0; font-family: -apple-system, sans-serif; background: #f5f5f5;">
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { useState } = React;

        function App() {
            const [loggedIn, setLoggedIn] = useState(false);
            const [currentVendor, setCurrentVendor] = useState('');
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            const [pedidos, setPedidos] = useState([]);
            const [loading, setLoading] = useState(false);

            // Tus usuarios del archivo original
            const usuarios = {
                'juan': { password: '1234', nombre: 'Juan García' },
                'maria': { password: '5678', nombre: 'María López' },
                'carlos': { password: 'pass123', nombre: 'Carlos Rodríguez' },
                'ana': { password: '9999', nombre: 'Ana Martinez' },
            };

            const cargarDatos = async (vendedor) => {
                setLoading(true);
                try {
                    const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vRu1GrwOg8hXB7RP6SUyeT0b5ceMWsKZ-6axPjYZtbLRroo1XF4OqpomphsMTgug44vg-kOu_Fa9l3T/gviz/tq?tqx=out:json&sheet=base de Pedidos');
                    const text = await response.text();
                    const jsonMatch = text.match(/\)\]\'\n(.*)\n/s);
                    if (jsonMatch) {
                        const data = JSON.parse(jsonMatch[1]);
                        const filtrados = data.table.rows.map(row => ({
                            nCL: row.c[0]?.v || '',
                            cliente: row.c[1]?.v || '',
                            fecha: row.c[2]?.v || '',
                            vend: row.c[3]?.v || '',
                            cumplimiento: row.c[4]?.v || ''
                        })).filter(p => p.vend.toLowerCase().includes(vendedor.toLowerCase()));
                        setPedidos(filtrados);
                    }
                } catch (err) {
                    setPedidos([]); // En caso de error de red
                }
                setLoading(false);
            };

            const handleLogin = (ev) => {
                ev.preventDefault();
                const user = usuarios[username];
                if (user && user.password === password) {
                    setCurrentVendor(username);
                    setLoggedIn(true);
                    cargarDatos(username);
                } else {
                    setLoginError('Credenciales inválidas');
                }
            };

            if (!loggedIn) {
                return e('div', { style: { display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh' } },
                    e('div', { style: { background: 'white', padding: '40px', borderRadius: '12px', boxShadow: '0 4px 12px rgba(0,0,0,0.1)', width: '320px' } },
                        e('h1', { style: { textAlign: 'center', fontSize: '24px' } }, '📦 HIPEC'),
                        e('form', { onSubmit: handleLogin },
                            e('input', { 
                                placeholder: 'Usuario', 
                                value: username, 
                                onChange: (v) => setUsername(v.target.value),
                                style: { width: '100%', padding: '10px', marginBottom: '10px', boxSizing: 'border-box' } 
                            }),
                            e('input', { 
                                type: 'password', 
                                placeholder: 'Contraseña', 
                                value: password, 
                                onChange: (v) => setPassword(v.target.value),
                                style: { width: '100%', padding: '10px', marginBottom: '20px', boxSizing: 'border-box' } 
                            }),
                            loginError && e('p', { style: { color: 'red', fontSize: '12px' } }, loginError),
                            e('button', { 
                                type: 'submit', 
                                style: { width: '100%', padding: '12px', background: '#1976d2', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer' } 
                            }, 'Entrar')
                        )
                    )
                );
            }

            return e('div', { style: { padding: '20px', maxWidth: '800px', margin: '0 auto' } },
                e('div', { style: { display: 'flex', justifyContent: 'space-between', background: 'white', padding: '20px', borderRadius: '8px' } },
                    e('h2', null, 'Pedidos de ' + usuarios[currentVendor].nombre),
                    e('button', { onClick: () => setLoggedIn(false) }, 'Salir')
                ),
                loading ? e('p', null, 'Cargando...') : e('table', { style: { width: '100%', marginTop: '20px', borderCollapse: 'collapse', background: 'white' } },
                    e('thead', null, e('tr', null, 
                        e('th', { style: { borderBottom: '1px solid #ddd', padding: '10px', textAlign: 'left' } }, 'Cliente'),
                        e('th', { style: { borderBottom: '1px solid #ddd', padding: '10px', textAlign: 'left' } }, 'Estado')
                    )),
                    e('tbody', null, pedidos.map((p, i) => e('tr', { key: i },
                        e('td', { style: { padding: '10px', borderBottom: '1px solid #eee' } }, p.cliente),
                        e('td', { style: { padding: '10px', borderBottom: '1px solid #eee' } }, p.cumplimiento)
                    )))
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
